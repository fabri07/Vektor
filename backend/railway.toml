[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -c 'from app.config.settings import get_settings; s=get_settings(); print(f\"Settings OK env={s.ENVIRONMENT}\")' && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
