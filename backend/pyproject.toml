[tool.ruff]
target-version = "py312"
line-length = 100
exclude = [".venv", ".venv312", ".python312", "htmlcov"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "C4", "SIM", "ANN"]
ignore = [
    "ANN401",  # Dynamically typed expressions (typing.Any) — accepted in places
    "B008",    # Do not perform function call in argument defaults — FastAPI Depends() pattern
]

[tool.ruff.lint.per-file-ignores]
"app/tests/**" = ["ANN", "S101"]
"app/persistence/migrations/**" = ["ANN", "N999"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["celery.*", "jose.*", "passlib.*", "boto3.*", "botocore.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["app.tests.*"]
disallow_untyped_defs = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["app/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--cov=app",
    "--cov-report=term-missing",
    "--cov-report=html:htmlcov",
    "--cov-fail-under=50",
    "-v",
]
asyncio_default_fixture_loop_scope = "session"

[tool.coverage.run]
source = ["app"]
omit = [
    "app/tests/*",
    "app/persistence/migrations/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "@overload",
]
